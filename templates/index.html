<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汝言汝语 · 首页</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-text">汝言汝语</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link active">首页</a></li>
                <li><a href="/about" class="nav-link">关于</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <!-- Logo -->
        <div class="logo-section">
            <h1 class="logo-title">汝言<span class="highlight">汝</span>语</h1>
        </div>

        <!-- 搜索框 -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入汉字，支持多个" autofocus>
                <button id="searchBtn">查询</button>
            </div>
        </div>

        <!-- 功能选项 -->
        <div class="mode-section">
            <div class="mode-option active" data-mode="char" id="modeChar">
                <span class="mode-label">查询汉字</span>
            </div>
            <div class="mode-option" data-mode="meaning" id="modeMeaning">
                <span class="mode-label">反查释义</span>
            </div>
        </div>

        <!-- 搜索结果 -->
        <div class="result-section" id="resultSection">
            <div class="result-header" id="resultHeader" style="display: none;">
                <span id="resultInfo">0 条结果</span>
            </div>
            <div class="table-wrapper">
                <table class="result-table" id="resultTable">
                    <thead>
                        <tr>
                            <th>汉字</th>
                            <th>读音</th>
                            <th>释义</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        <!-- 结果动态生成 -->
                    </tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyState">
                <p>输入内容开始查询</p>
                <small>支持多个汉字同时查询</small>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>汝言汝语 · 2026</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
